name: KidGameMaker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON contracts and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate JSON files
        run: python tools/validate_json.py

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check
